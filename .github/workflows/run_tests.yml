name: Run tests

on:
  pull_request:
  workflow_call:
    inputs:
      run_slow_tests:
        description: "Whether to run slow tests"
        required: false
        default: false
        type: boolean
      test_args:
        description: "Additional arguments or paths to pass to pytest"
        required: false
        default: ""
        type: string

jobs:
  run_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # head_commit is only populated on push events; use the PR title on
    # pull_request events so the skip marker works in both contexts.
    if: >-
      ${{
        ! contains(github.event.head_commit.message, '[skip fast tests]') &&
        ! contains(github.event.pull_request.title, '[skip fast tests]')
      }}
    env:
      PYTENSOR_FLAGS: "blas__ldflags=-L/usr/lib/x86_64-linux-gnu -lblas -llapack"
      HSSM_TEST_ARGS: ${{ inputs.test_args }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/setup-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run fast tests
        if: ${{ !inputs.run_slow_tests }}
        run: uv run python scripts/run_pytest_safe.py -m "not slow"

      - name: Run all tests
        if: ${{ inputs.run_slow_tests }}
        run: uv run python scripts/run_pytest_safe.py
        env:
          # Log per-test RSS to diagnose slow-test memory leaks. This step only
          # runs on the slow-test path (run_slow_tests.yml), so it stays scoped.
          HSSM_TEST_RSS_LOG: "1"
