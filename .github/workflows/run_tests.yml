name: Run tests

on:
  pull_request:
  workflow_call:
    inputs:
      run_slow_tests:
        description: "Whether to run slow tests"
        required: false
        default: false
        type: boolean
      test_args:
        description: "Additional arguments or paths to pass to pytest"
        required: false
        default: ""
        type: string

jobs:
  run_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ ! contains(github.event.head_commit.message, '[skip fast tests]') }}
    env:
      PYTENSOR_FLAGS: "blas__ldflags=-L/usr/lib/x86_64-linux-gnu -lblas -llapack"

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/setup-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run fast tests
        if: ${{ !inputs.run_slow_tests }}
        run: uv run pytest -m "not slow"
        env:
          PYTENSOR_FLAGS: ${{ env.PYTENSOR_FLAGS }}

      - name: Run all tests
        if: ${{ inputs.run_slow_tests }}
        run: uv run pytest ${{ inputs.test_args }}
        env:
          # Log per-test RSS to diagnose slow-test memory leaks. This step only
          # runs on the slow-test path (run_slow_tests.yml), so it stays scoped.
          HSSM_TEST_RSS_LOG: "1"
          PYTENSOR_FLAGS: ${{ env.PYTENSOR_FLAGS }}
